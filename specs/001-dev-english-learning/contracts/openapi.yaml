openapi: 3.0.3
info:
  title: DocsDrivenEnglish MVP API
  version: 0.1.0
  description: |
    プログラマー向け英語学習サイト（MVP）のAPI契約。
    実装は Next.js API Routes + Hono RPC を想定するが、契約は REST 形式で記述する。

servers:
  - url: https://{host}
    variables:
      host:
        default: example.com

tags:
  - name: document
  - name: quiz
  - name: history

components:
  securitySchemes:
    clerkSession:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    Mode:
      type: string
      enum: [word, reading]

    StartFromUrlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

    StartFromUrlResponse:
      type: object
      required: [corpusId, sourceUrl, sourceQuoteText]
      properties:
        corpusId:
          type: string
        sourceUrl:
          type: string
          format: uri
        sourceQuoteText:
          type: string
        title:
          type: string
          nullable: true

    StartSessionRequest:
      type: object
      required: [corpusId, mode]
      properties:
        corpusId:
          type: string
        mode:
          $ref: '#/components/schemas/Mode'

    Choice:
      type: object
      required: [index, text]
      properties:
        index:
          type: integer
          minimum: 0
          maximum: 3
        text:
          type: string

    QuestionItem:
      type: object
      required: [questionId, prompt, choices, sourceUrl, sourceQuoteText]
      properties:
        questionId:
          type: string
        prompt:
          type: string
        choices:
          type: array
          minItems: 4
          maxItems: 4
          items:
            $ref: '#/components/schemas/Choice'
        sourceUrl:
          type: string
          format: uri
        sourceQuoteText:
          type: string

    StartSessionResponse:
      type: object
      required: [sessionId, plannedCount, actualCount, questions]
      properties:
        sessionId:
          type: string
        plannedCount:
          type: integer
          example: 10
        actualCount:
          type: integer
          description: 10 未満の場合はその値（全X問で終了）
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionItem'

    SubmitAnswerRequest:
      type: object
      required: [sessionId, questionId, selectedIndex]
      properties:
        sessionId:
          type: string
        questionId:
          type: string
        selectedIndex:
          type: integer
          minimum: 0
          maximum: 3

    SubmitAnswerResponse:
      type: object
      required: [isCorrect, explanation, sourceUrl, sourceQuoteText]
      properties:
        isCorrect:
          type: boolean
        explanation:
          type: string
        sourceUrl:
          type: string
          format: uri
        sourceQuoteText:
          type: string

    HistorySummaryResponse:
      type: object
      required: [attemptCount, correctRate, studyDays]
      properties:
        attemptCount:
          type: integer
        correctRate:
          type: number
          format: float
          minimum: 0
          maximum: 1
        studyDays:
          type: integer
          description: distinct days（ログインユーザーのみ）

paths:
  /api/document/start:
    post:
      tags: [document]
      summary: 入力URLから教材（corpus）を作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartFromUrlRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartFromUrlResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream fetch/parse failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/quiz/session/start:
    post:
      tags: [quiz]
      summary: セッション開始（最大10問）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartSessionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/quiz/answer:
    post:
      tags: [quiz]
      summary: 回答提出（採点 + 解説 + 出典）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswerResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/history/summary:
    get:
      tags: [history]
      summary: 学習履歴の集計（ログインユーザー）
      security:
        - clerkSession: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
