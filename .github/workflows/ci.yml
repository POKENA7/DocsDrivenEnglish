name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  knip:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run knip
        working-directory: frontend
